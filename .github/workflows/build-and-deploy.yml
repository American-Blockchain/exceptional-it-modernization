name: Build and Push MAS Agents

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  id-token: write 
  contents: read

env:
  ACR_NAME: ${{ vars.ACR_NAME }} 
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }} 
  CA_PYTHON_NAME: ${{ vars.CA_PYTHON_NAME }}
  CA_CSHARP_NAME: ${{ vars.CA_CSHARP_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Python Specialist
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/python-specialist:${{ github.sha }} ./src/python-specialist
          docker push ${{ env.ACR_NAME }}.azurecr.io/python-specialist:${{ github.sha }}
          docker tag ${{ env.ACR_NAME }}.azurecr.io/python-specialist:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/python-specialist:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/python-specialist:latest

      - name: Build and Push C# Orchestrator
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:${{ github.sha }} ./src/csharp-orchestrator
          docker push ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:${{ github.sha }}
          docker tag ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Python Specialist
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ env.ACR_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CA_PYTHON_NAME }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/python-specialist:${{ github.sha }}

      - name: Deploy C# Orchestrator
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ env.ACR_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CA_CSHARP_NAME }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:${{ github.sha }}