name: Build and Push MAS Agents

on:
  push:
    branches:
      - main
      - bass
    paths:
      - "src/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  # Fallbacks align exactly with infra_actions/variables.tf defaults
  ACR_NAME: ${{ vars.ACR_NAME || 'primeagentacr' }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-terraform-state' }}
  CA_PYTHON_NAME: ${{ vars.CA_PYTHON_NAME || 'ca-python-specialist' }}
  CA_CSHARP_NAME: ${{ vars.CA_CSHARP_NAME || 'ca-csharp-orchestrator' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Python Specialist
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/python-specialist:${{ github.sha }} ./src/python-specialist
          docker push ${{ env.ACR_NAME }}.azurecr.io/python-specialist:${{ github.sha }}
          docker tag ${{ env.ACR_NAME }}.azurecr.io/python-specialist:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/python-specialist:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/python-specialist:latest

      - name: Build and Push C# Orchestrator
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:${{ github.sha }} ./src/csharp-orchestrator
          docker push ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:${{ github.sha }}
          docker tag ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Python Specialist via CLI
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ca-python-specialist \
              --resource-group rg-terraform-state \
              --image primeagentacr.azurecr.io/python-specialist:${{ github.sha }} \
              --no-wait

      - name: Deploy C# Orchestrator via CLI
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ env.CA_CSHARP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.ACR_NAME }}.azurecr.io/csharp-orchestrator:${{ github.sha }} \
              --no-wait

  deploy-frontend:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch C# Orchestrator FQDN
        id: fetch-fqdn
        run: |
          CSHARP_FQDN=$(az containerapp show \
            --name ${{ env.CA_CSHARP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "PYTHON_AGENT_URL=https://$CSHARP_FQDN" >> $GITHUB_ENV

      - name: Install pnpm & Vercel CLI
        run: |
          npm install -g pnpm
          npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --cwd src/ag-ui-client --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          
      - name: Build Project Artifacts
        run: vercel build --prod --cwd src/ag-ui-client --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PYTHON_AGENT_URL: ${{ env.PYTHON_AGENT_URL }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --cwd src/ag-ui-client --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
